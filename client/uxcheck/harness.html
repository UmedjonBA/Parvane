<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MONOLITH — UX harness</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../src/styles.css" />
  <link rel="stylesheet" href="../src/styles-screens.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    #root { display: flex; }
    .ws-screen { flex: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- mock backend MUST run before live.jsx so window.__TAURI__ exists -->
  <script src="./mock-backend.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- same script set as index.html, minus app.jsx (we mount WorkspaceScreen directly) -->
  <script type="text/babel" src="../src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="../src/data.jsx"></script>
  <script type="text/babel" src="../src/atoms.jsx"></script>
  <script type="text/babel" src="../src/live.jsx"></script>
  <script type="text/babel" src="../src/shell.jsx"></script>
  <script type="text/babel" src="../src/store.jsx"></script>
  <script type="text/babel" src="../src/screens/calendar.jsx"></script>
  <script type="text/babel" src="../src/screens/diary.jsx"></script>
  <script type="text/babel" src="../src/screens/messenger.jsx"></script>
  <script type="text/babel" src="../src/screens/notes.jsx"></script>
  <script type="text/babel" src="../src/screens/workspace.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WorkspaceScreen me="tester@local" />);

    // helpers for the Playwright runner to assert against
    window.__ux = {
      ready: true,
      liveNotes: () => (window.__MOCK_NOTES__ || []).filter((n) => !n.deleted),
      liveCount: () => (window.__MOCK_NOTES__ || []).filter((n) => !n.deleted).length,
      folders: () => { try { return JSON.parse(localStorage.getItem("pv_folders") || "[]"); } catch { return []; } },
      noteFolders: () => { try { return JSON.parse(localStorage.getItem("pv_note_folders") || "{}"); } catch { return {}; } },
      // dispatch a real HTML5 drag from a note row onto a folder row
      dragNoteToFolder: (noteTitle, folderName) => {
        const rows = [...document.querySelectorAll(".vault-row")];
        const note = rows.find((r) => r.getAttribute("draggable") === "true" && r.textContent.includes(noteTitle));
        const folder = rows.find((r) => r.querySelector(".row-add") && r.textContent.includes(folderName));
        if (!note || !folder) return { ok: false, note: !!note, folder: !!folder };
        const dt = new DataTransfer();
        note.dispatchEvent(new DragEvent("dragstart", { bubbles: true, dataTransfer: dt }));
        folder.dispatchEvent(new DragEvent("dragover", { bubbles: true, dataTransfer: dt }));
        folder.dispatchEvent(new DragEvent("drop", { bubbles: true, dataTransfer: dt }));
        note.dispatchEvent(new DragEvent("dragend", { bubbles: true, dataTransfer: dt }));
        return { ok: true };
      },
    };
  </script>
</body>
</html>
