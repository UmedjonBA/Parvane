# Parvane NATS server config
# Каждый компонент подключается с отдельным пользователем и видит только свои топики.

port: 4222

authorization {
  users = [
    # Identity шард
    {
      user: identity
      password: identity-secret
      permissions: {
        subscribe: ["identity.token.issue", "identity.token.verify"]
        publish:   ["_INBOX.>"]
      }
    }

    # Messenger шард
    {
      user: messenger
      password: messenger-secret
      permissions: {
        subscribe: ["msg.chat.send", "msg.chat.read", "msg.sync.request"]
        publish:   ["msg.chat.delivered", "msg.sync.response", "_INBOX.>", "identity.token.verify"]
      }
    }

    # Cloud шард
    {
      user: cloud
      password: cloud-secret
      permissions: {
        subscribe: ["file.upload.chunk", "file.upload.complete", "file.download.request"]
        publish:   ["file.download.response", "_INBOX.>", "identity.token.verify"]
      }
    }

    # Клиент (Tauri)
    {
      user: client
      password: client-secret
      permissions: {
        publish: [
          "identity.token.issue",
          "msg.chat.send", "msg.chat.read", "msg.sync.request",
          "file.upload.chunk", "file.upload.complete", "file.download.request"
        ]
        subscribe: [
          "msg.chat.delivered", "msg.sync.response",
          "file.download.response",
          "_INBOX.>"
        ]
      }
    }

    # Dev/тесты — без ограничений
    {
      user: dev
      password: dev
      permissions: {
        publish:   [">"]
        subscribe: [">"]
      }
    }
  ]
}
